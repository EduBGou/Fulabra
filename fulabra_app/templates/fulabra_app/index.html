{% extends 'fulabra_app/layout.html' %}
{% load static %}

{% block body %}
  <form hx-post="{% url 'check_lobby' %}" hx-swap="none">
    {% csrf_token %}
    <div class="form-group">
      <input id="lobby_code" name="lobby_code" class="form-control" type="text" placeholder="lobby code" />
    </div>
    <div class="form-group">
      <button class="btn btn-primary" type="submit">Enter</button>
    </div>
  </form>

  <div id="msg-div"></div>
{% endblock %}
