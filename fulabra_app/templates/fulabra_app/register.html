{% extends 'fulabra_app/layout.html' %}
{% load static %}

{% block body %}
  <h2>Register</h2>

  <div id="msg-div"></div>

  <form hx-post="{% url 'register' %}" hx-swap="none" hx-on::after-settle="focusInvalidField()">
    {% csrf_token %}
    <div class="form-group">
      <input id="username-field" class="form-control" autofocus type="text" name="username" placeholder="Username" />
    </div>
    <div class="form-group">
      <input id="email-field" class="form-control" type="email" name="email" placeholder="Email Address" />
    </div>
    <div class="form-group">
      <input class="form-control" type="password" name="password" placeholder="Password" />
    </div>
    <div class="form-group">
      <input id="confirmation-field" class="form-control" type="password" name="confirmation" placeholder="Confirm Password" />
    </div>
    <input class="btn btn-primary" type="submit" value="Register" />
  </form>Already have an account? <a href="{% url 'login' %}">Log In here.</a>

  
{% endblock %}
