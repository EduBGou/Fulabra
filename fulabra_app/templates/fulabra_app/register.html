{% extends 'fulabra_app/layout.html' %}
{% load static %}

{% block body %}
  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow border-0 rounded-4 overflow-hidden">
          <div class="bg-primary p-4 text-center text-white">
            <h3 class="fw-bold mb-0">Create Account</h3>
          </div>

          <div class="card-body p-4 p-sm-5">
            <div id="error-message" class="mb-3"></div>

            <form hx-post="{% url 'register' %}" hx-swap="none" novalidate>
              {% csrf_token %}

              <div class="mb-3">
                <label for="username-field" class="form-label fw-medium text-secondary small">Username</label>
                <div class="input-group">
                  <input type="text" name="username" id="username-field" class="form-control border-start-0 fs-6 bg-light" placeholder="Choose a username" autofocus required />
                </div>
              </div>

              <div class="mb-3">
                <label for="email-field" class="form-label fw-medium text-secondary small">Email Address</label>
                <div class="input-group">
                  <input type="email" name="email" id="email-field" class="form-control border-start-0 fs-6 bg-light" placeholder="name@example.com" required />
                </div>
              </div>

              <div class="mb-3">
                <label for="password-field" class="form-label fw-medium text-secondary small">Password</label>
                <div class="input-group">
                  <input type="password" name="password" id="password-field" class="form-control border-start-0 fs-6 bg-light" placeholder="••••••••" required />
                </div>
              </div>

              <div class="mb-4">
                <label for="confirmation-field" class="form-label fw-medium text-secondary small">Confirm Password</label>
                <div class="input-group">
                  <input type="password" name="confirmation" id="confirmation-field" class="form-control border-start-0 fs-6 bg-light" placeholder="Repeat your password" required />
                </div>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary rounded-3 fw-semibold fs-6 py-2.5 shadow-sm">Register Account</button>
              </div>
            </form>
          </div>

          <div class="card-footer bg-light border-0 py-3 text-center">
            <p class="mb-0 small text-muted fw-medium">
              Already have an account?
              <a href="{% url 'login' %}" class="text-decoration-none text-primary fw-semibold ms-1">Log In here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
