{% extends 'fulabra_app/layout.html' %}

{% block body %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h4 class="mb-0">Editar Seu Perfil</h4>
                </div>
                <div class="card-body">

                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="form-group">
                            <label for="id_nickname"><strong>Nickname:</strong></label>
                            {{ form.nickname }}
                            <small class="text-muted">Como você quer ser chamado nas partidas.</small>
                        </div>

                        <div class="form-group">
                            <label for="id_avatar"><strong>Nome do Arquivo de Avatar:</strong></label>
                            {{ form.avatar }}
                            <small class="text-muted">Digite o nome da imagem salva nos estáticos (ex: default_avatar.png).</small>
                        </div>

                        <hr>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'profile' username=user.username %}" class="btn btn-secondary">
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-success">
                                Salvar Alterações
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
