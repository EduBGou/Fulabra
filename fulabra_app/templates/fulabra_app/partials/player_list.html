<div id="lobby-controls" hx-swap-oob="true">
  <p>There is {{ players.count }}/3 players connected</p>
  {% if players.count == 3 %}
    <form ws-send>
      <input type="hidden" name="action" value="start_game" />
      <button type="submit" class="btn btn-info">Start</button>
    </form>
  {% endif %}
  <ul>
    {% for p in players %}
      <li>{{ p.username }}</li>
    {% endfor %}
  </ul>
</div>
