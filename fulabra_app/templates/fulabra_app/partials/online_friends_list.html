<div id="online-friends-div" class="col-12 col-lg-4">
  <div class="card border-0 rounded-4 shadow-lg h-100 p-4">
    <h4 class="fw-bold mb-3 d-flex align-items-center gap-2"><span class="pulse-indicator bg-success me-2" role="status"></span>&nbsp;Online Friends</h4>
    <p class="text-muted small mb-4">Invite your squad to fill the missing slots.</p>

    <div class="friend-sidebar-list d-flex flex-column gap-2 overflow-auto style-scrollbar" style="max-height: 400px;">
      {% for f in context.current_lobby.leader.user.friends.all %}
        <div class="d-flex align-items-center justify-content-between p-2 rounded-3 transition-all">
          <div class="d-flex align-items-center text-truncate">
            <div class="position-relative">
              <img src="{{ f.player.avatar.url|default:'avatars/default_avatar.png' }}" alt="Avatar" class="rounded-circle" style="width: 40px; height: 40px; object-fit: cover;" />
            </div>
            <span class="fw-medium text-truncate">&ensp;{{ f.player.nickname }}</span>
          </div>

          <button type="button" class="btn btn-sm btn-primary rounded-pill px-3 fw-bold invite-btn">Invite</button>
        </div>
      {% empty %}
        <div class="text-center py-5 text-muted">
          <i class="bi bi-people mb-2 display-6 d-block"></i>
          <p class="small m-0">No friends online right now.</p>
        </div>
      {% endfor %}
    </div>
  </div>
</div>
