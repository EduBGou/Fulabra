<span id="round-countdown" hx-swap-oob="true" class="text-danger fw-extrabold" data-seconds="{{ seconds }}">
  {{ seconds }}s{% if seconds == 0 %}
    <script>
      ;(function () {

        const wordForm = document.querySelector('form[ws-send]')
        const wordIpt = document.querySelector('#action')
        if (wordIpt.value === 'submit_word') {
          wordForm.requestSubmit()
        }
      })()
    </script>
  {% endif %}
  <span></span>
</span>
