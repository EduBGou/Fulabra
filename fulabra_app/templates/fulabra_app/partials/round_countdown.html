<div id="round-countdown" hx-swap-oob="true" class="fs-1 fw-extrabold text-danger col" data-seconds="{{ seconds }}">
  {{ seconds }}s{% if seconds == 0 %}
    <script>
      ;(function () {
        const wordForm = document.querySelector('form[ws-send]')
        if (wordForm) {
          if (wordForm.dataset.submitted === 'False') {
            wordForm.requestSubmit()
          }
        }
      })()
    </script>
  {% endif %}
</div>
